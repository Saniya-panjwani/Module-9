<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">🏥 Doctor Finder</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/profile/">Profile</a>
                <a class="nav-link" href="/contact/">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="page-title">Available Doctors</h1>
        
        <div class="row">
            {% for doc in doctor %}
            <div class="col-md-6">
                <div class="doctor-card">
                    <div class="doctor-name">{{ doc.name }}</div>
                    <div class="doctor-info"><strong>Specialization:</strong> {{ doc.specialization }}</div>
                    <div class="doctor-info"><strong>Experience:</strong> {{ doc.experience }} years</div>
                    <div class="doctor-info"><strong>City:</strong> {{ doc.city }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <div class="text-center mt-4">
            <a href="/" class="btn btn-outline-primary">← Back to Home</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2024 Doctor Finder - Your Health, Our Priority</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
